<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>フレームタイマー</title>
  <style>
    body {
      background: #1a1a1a;
      color: white;
      font-family: sans-serif;
      text-align: center;
      margin: 0;
      padding: 40px 20px;
    }

    h2 {
      margin-top: 0;
      margin-bottom: 20px;
    }

    #timer {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      margin: 20px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      background: conic-gradient(#7dd3fc 0deg, #2a2a2a 0deg);
      transition: box-shadow 0.1s ease;
    }

    .flash {
      box-shadow: 0 0 25px #7dd3fc;
    }

    .controls {
      margin-top: 15px;
    }

    button {
      margin: 5px;
      padding: 10px 16px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      background: #7dd3fc;
      color: #111;
      font-weight: bold;
    }

    button:hover {
      opacity: 0.9;
    }

    input {
      font-size: 16px;
      padding: 6px 8px;
      border-radius: 6px;
      border: none;
      width: 90px;
      text-align: center;
    }

    #statusText {
      margin-top: 10px;
      font-size: 14px;
      color: #aaa;
    }

    #frameInfo {
      margin-top: 8px;
      font-size: 13px;
      color: #ccc;
    }

    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #999;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h2>フレームタイマー</h2>

  <div id="timer">
    <div id="timeText">0.00</div>
  </div>

  <div class="controls">
    <button id="resetButton">リセット</button>
    <button id="soundButton">音ON</button>
  </div>

  <div class="controls">
    <button id="minusFrameButton">-1F</button>
    <input id="frameInput" type="number" value="184" min="1">
    <button id="plusFrameButton">+1F</button>
  </div>

  <div id="frameInfo">184F（約3.067秒）</div>
  <div id="statusText">リズム: 184F / 1周</div>
  <div class="hint">
    カウントアップ表示 / 3分割リズム / 最後だけ強音
  </div>

  <script>
    const FPS = 60;

    let cycleFrames = 184;
    let CYCLE_MS = (cycleFrames / FPS) * 1000;

    const timerEl = document.getElementById("timer");
    const timeTextEl = document.getElementById("timeText");
    const resetButton = document.getElementById("resetButton");
    const soundButton = document.getElementById("soundButton");

    const minusFrameButton = document.getElementById("minusFrameButton");
    const plusFrameButton = document.getElementById("plusFrameButton");
    const frameInput = document.getElementById("frameInput");
    const frameInfo = document.getElementById("frameInfo");
    const statusText = document.getElementById("statusText");

    let startTime = performance.now();
    let prevElapsed = 0;

    let soundEnabled = false;
    let audioContext = null;

    async function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (audioContext.state === "suspended") {
        await audioContext.resume();
      }
    }

    function playBeep(type) {
      if (!soundEnabled) return;
      ensureAudioContext();

      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();

      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);

      const now = audioContext.currentTime;

      if (type === "strong") {
        oscillator.frequency.value = 880;
        gainNode.gain.setValueAtTime(0.0001, now);
        gainNode.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.14);
      } else {
        oscillator.frequency.value = 520;
        gainNode.gain.setValueAtTime(0.0001, now);
        gainNode.gain.exponentialRampToValueAtTime(0.08, now + 0.01);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, now + 0.08);
      }

      oscillator.type = "sine";
      oscillator.start(now);
      oscillator.stop(now + 0.16);
    }

    function flashStrongBeat() {
      timerEl.classList.add("flash");
      setTimeout(() => timerEl.classList.remove("flash"), 100);
    }

    function crossedBoundary(prev, current, boundary) {
      return prev < boundary && current >= boundary;
    }

    function updateFrameInfo() {
      frameInput.value = cycleFrames;
      frameInfo.textContent = `${cycleFrames}F（約${(cycleFrames / FPS).toFixed(3)}秒）`;
      statusText.textContent = `リズム: ${cycleFrames}F / 1周`;
    }

    function updateCycle(newFrames) {
      if (newFrames < 1) return;

      const currentElapsed = (performance.now() - startTime) % CYCLE_MS;
      const progress = currentElapsed / CYCLE_MS;

      cycleFrames = newFrames;
      CYCLE_MS = (cycleFrames / FPS) * 1000;

      const adjustedElapsed = CYCLE_MS * progress;
      startTime = performance.now() - adjustedElapsed;
      prevElapsed = adjustedElapsed;

      updateFrameInfo();
    }

    function resetCycle() {
      startTime = performance.now();
      prevElapsed = 0;
      timeTextEl.textContent = "0.00";
      timerEl.style.background =
        `conic-gradient(#7dd3fc 0deg, #2a2a2a 0deg)`;
    }

    function update(now) {
      const elapsed = (now - startTime) % CYCLE_MS;
      const progress = elapsed / CYCLE_MS;
      const degree = progress * 360;
      const elapsedSeconds = elapsed / 1000;

      timerEl.style.background =
        `conic-gradient(#7dd3fc 0deg, #7dd3fc ${degree}deg, #2a2a2a ${degree}deg, #2a2a2a 360deg)`;

      // カウントアップ表示
      timeTextEl.textContent = elapsedSeconds.toFixed(2);

      // 3分割リズム（1,2が弱音、周回で強音）
      const divisions = 3;
      const step = CYCLE_MS / divisions;

      for (let i = 1; i < divisions; i++) {
        const boundary = step * i;
        if (crossedBoundary(prevElapsed, elapsed, boundary)) {
           playBeep("weak");
        }
      }

      // 1周して先頭に戻った瞬間
      if (elapsed < prevElapsed) {
        playBeep("strong");
        flashStrongBeat();
      }

      prevElapsed = elapsed;

      requestAnimationFrame(update);
    }

    resetButton.addEventListener("click", () => {
      ensureAudioContext();
      resetCycle();
    });

    soundButton.addEventListener("click", async () => {
      soundEnabled = !soundEnabled;

      if (soundEnabled) {
        await ensureAudioContext();
        soundButton.textContent = "音OFF";
      } else {
        soundButton.textContent = "音ON";
      }
    });

    minusFrameButton.addEventListener("click", () => {
      updateCycle(cycleFrames - 1);
    });

    plusFrameButton.addEventListener("click", () => {
      updateCycle(cycleFrames + 1);
    });

    frameInput.addEventListener("change", () => {
      const value = parseInt(frameInput.value, 10);
      if (!isNaN(value) && value > 0) {
        updateCycle(value);
      } else {
        updateFrameInfo();
      }
    });

    document.addEventListener("click", ensureAudioContext, { once: true });

    updateFrameInfo();
    resetCycle();
    requestAnimationFrame(update);
  </script>

</body>
</html>
